apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-sync-api
  namespace: cms-sync
  labels:
    app: cms-sync-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-sync-api
  template:
    metadata:
      labels:
        app: cms-sync-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/cms-sync-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cms-sync-api-config
            - secretRef:
                name: cms-sync-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
