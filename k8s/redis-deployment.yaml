apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-sync-redis
  namespace: cms-sync
  labels:
    app: cms-sync-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-sync-redis
  template:
    metadata:
      labels:
        app: cms-sync-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
