name: CI/XD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Unit Tests
        run: dotnet test --no-build --verbosity normal --configuration Release --filter "FullyQualifiedName!~IntegrationTests"
      - name: Integration Tests
        run: dotnet test --no-build --verbosity normal --configuration Release --filter "FullyQualifiedName~IntegrationTests"

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore benchmarks/benchmarks.csproj
      - name: Run Benchmarks
        run: dotnet run -c Release --project benchmarks/benchmarks.csproj > benchmark-results.txt
      - name: Download Previous Benchmark Results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: .
        continue-on-error: true
      - name: Compare Benchmarks
        run: python3 benchmarks/compare_benchmarks.py || (echo "Performance regression detected!" && exit 1)
      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
