name: CI/XD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cmssync
          POSTGRES_USER: cmsuser
          POSTGRES_PASSWORD: cmspassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cmsuser -d cmssync"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Unit Tests
        run: dotnet test --no-build --verbosity normal --configuration Release --filter "FullyQualifiedName!~IntegrationTests"
      - name: Integration Tests
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=cmssync;Username=cmsuser;Password=cmspassword
        run: dotnet test --no-build --verbosity normal --configuration Release --filter "FullyQualifiedName~IntegrationTests"
