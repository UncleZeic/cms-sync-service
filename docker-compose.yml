services:
  migrate:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src
    volumes:
      - .:/src
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=cmssync;Username=cmsuser;Password=cmspassword
      PATH: /root/.dotnet/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    command: >
      sh -c " dotnet tool install --global dotnet-ef --version 10.0 && export PATH=$PATH:/root/.dotnet/tools && dotnet restore src/CmsSyncService.Api/CmsSyncService.Api.csproj && dotnet ef database update --project src/CmsSyncService.Infrastructure --startup-project src/CmsSyncService.Api"

    depends_on:
      db:
        condition: service_healthy
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmssyncservice-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=cmssync;Username=cmsuser;Password=cmspassword
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__Enabled: true
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__QueueName: cms-events
      RabbitMQ__RetryQueueName: cms-events.retry
      RabbitMQ__DeadLetterQueueName: cms-events.dead-letter
      RabbitMQ__RetryDelayMilliseconds: 5000
      RabbitMQ__MaxRetryAttempts: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  db:
    image: postgres:16
    container_name: cmssyncservice-db
    restart: no
    environment:
      POSTGRES_DB: cmssync
      POSTGRES_USER: cmsuser
      POSTGRES_PASSWORD: cmspassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmsuser -d cmssync"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: cmssyncservice-redis
    restart: no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cmssyncservice-rabbitmq
    restart: no
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
